services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kds-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kds
      POSTGRES_USER:     kds
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kds_local_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kds_net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U kds -d kds"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    container_name: kds-api
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV:             production
      PORT:                 "3000"
      DATABASE_URL:         postgresql://kds:${DB_PASSWORD:-kds_local_secret}@db:5432/kds
      SESSION_SECRET:       ${SESSION_SECRET:-change_me_please_use_install_sh}
      # ── Admin & Feature Flags ─────────────────────────────────────────────
      # Leave ADMIN_PASSWORD blank for open access on a trusted LAN.
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD:-}
      ALLOW_TEST_ORDERS:    ${ALLOW_TEST_ORDERS:-true}
      HIDDEN_INTEGRATIONS:  ${HIDDEN_INTEGRATIONS:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kds_net
    # Expose API directly for the CLI tool (localhost only)
    ports:
      - "127.0.0.1:3000:3000"

  # ── KDS Web Frontend ───────────────────────────────────────────────────────
  web:
    container_name: kds-web
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - kds_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  # This is the only container with a public port.
  # KDS displays on the LAN connect to http://<server-ip>/
  # Override the host port via HOST_PORT in your .env (e.g. HOST_PORT=8080 for Windows IIS conflict)
  proxy:
    image: nginx:1.27-alpine
    container_name: kds-proxy
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - kds_net
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:80/api/health"]
      interval: 15s
      timeout:  5s
      retries:  3

volumes:
  postgres_data:
    name: kds_postgres_data

networks:
  kds_net:
    driver: bridge
    name: kds_network
