name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Type-check all TypeScript packages ────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: pnpm run typecheck

  # ── Job 2: Build Docker images and verify the stack is healthy ────────────────
  docker-health:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Generate test environment file
        run: |
          cp .env.example .env
          # Replace placeholder values with real random secrets for CI
          DB_PASS=$(openssl rand -hex 16)
          SESSION=$(openssl rand -hex 32)
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${DB_PASS}/" .env
          sed -i "s/SESSION_SECRET=.*/SESSION_SECRET=${SESSION}/" .env
          echo "HOST_PORT=8080" >> .env

      - name: Build Docker images
        run: docker compose build
        # First build takes ~3–5 minutes due to npm install inside Docker

      - name: Start all services
        run: docker compose up -d

      - name: Wait for API to become healthy (up to 90s)
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 45); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy after ${i}x2s"
              exit 0
            fi
            echo "  attempt $i/45 — HTTP $STATUS — retrying in 2s..."
            sleep 2
          done
          echo "::error::API did not become healthy within 90 seconds"
          docker compose logs api
          exit 1

      - name: Verify KDS frontend loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$STATUS" != "200" ]; then
            echo "::error::KDS frontend returned HTTP $STATUS (expected 200)"
            docker compose logs web
            exit 1
          fi
          echo "KDS frontend OK — HTTP $STATUS"

      - name: Inject a test order (end-to-end smoke test)
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8080/api/test/inject-order)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Test order injection returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Test order injected successfully"

      - name: Check API health endpoint fields
        run: |
          HEALTH=$(curl -s http://localhost:8080/api/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('ok', 'healthy'), f'Unexpected status: {d}'
          print('Health check passed:', d)
          "

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down services
        if: always()
        run: docker compose down -v --remove-orphans
