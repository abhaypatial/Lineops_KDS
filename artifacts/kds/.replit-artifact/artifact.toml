kind = "web"
previewPath = "/"
title = "Kitchen Display System"
version = "1.0.0"
id = "artifacts/kds"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19773

[services.development]
run = "pnpm --filter @workspace/kds run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kds", "run", "build" ]
publicDir = "artifacts/kds/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19773"
BASE_PATH = "/"
