# KDS — Main reverse proxy
# Listens on :80, routes traffic to api and web containers

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  sendfile        on;
  keepalive_timeout 65;

  # ── Upstream services ──────────────────────────────────────────────────────
  upstream api_server {
    server api:3000;
  }

  upstream kds_web {
    server web:80;
  }

  # ── Main server block ──────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ── WebSocket (real-time order push) ─────────────────────────────────────
    location /ws {
      proxy_pass         http://api_server;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 86400s;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://api_server;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── KDS Display / Admin frontend (SPA) ────────────────────────────────────
    location / {
      proxy_pass         http://kds_web;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

      # SPA fallback handled by the web container itself
    }
  }
}
